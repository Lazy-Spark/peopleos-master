# PeopleOS — local development infrastructure.
# Phase 1 slice needs Postgres (pgvector), Redis, Neo4j, and MinIO (S3).
# Pinecone/Snowflake/Kafka/Temporal arrive in later phases (see spec).
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: peopleos-postgres
    environment:
      POSTGRES_USER: peopleos
      POSTGRES_PASSWORD: peopleos
      POSTGRES_DB: peopleos
    ports:
      - "5432:5432"
    volumes:
      - peopleos_pg:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peopleos -d peopleos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: peopleos-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - peopleos_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: peopleos-neo4j
    environment:
      NEO4J_AUTH: neo4j/peopleos_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # browser
      - "7687:7687" # bolt
    volumes:
      - peopleos_neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: peopleos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - peopleos_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  peopleos_pg:
  peopleos_redis:
  peopleos_neo4j:
  peopleos_minio:
